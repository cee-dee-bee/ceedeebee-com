<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CdBlog — Christian deBettencourt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens ── */
    :root {
      --bg: #0f1117;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-bright: #f8fafc;
      --accent: #60a5fa;
      --border: #1e293b;
    }

    /* ── Reset & base ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    /* ── Nav ── */
    nav {
      max-width: 560px;
      margin: 0 auto 3rem;
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      position: relative;
      padding-bottom: 2px;
      transition: color 0.2s ease;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background-color: var(--accent);
      transition: width 0.2s ease;
    }

    nav a:hover,
    nav a.active {
      color: var(--accent);
    }

    nav a.active::after,
    nav a:hover::after {
      width: 100%;
    }

    /* ── Layout ── */
    main {
      max-width: 560px;
      margin: 0 auto;
    }

    h1 {
      font-family: "Big Shoulders Display", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .tbd {
      font-size: 0.975rem;
      color: var(--text-muted);
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Me</a>
    <a href="resume.html">Resume</a>
    <a href="blog.html" class="active">CdBlog</a>
  </nav>

  <main>
    <h1>CdBlog</h1>
    <p class="tbd">Posts coming soon.</p>
  </main>

</body>
</html>
